
<div class="jobs-container">
    <mat-card>
        <mat-card-header>
          <mat-card-title>Job Description</mat-card-title>
          <mat-card-subtitle>moving towards Dream</mat-card-subtitle>
        </mat-card-header>
         
        <mat-card-content>
          <p class="jobDescription" *ngFor="let data of jobDetails.data">
             <strong> {{data.toDisplay}}</strong>
             
              <mat-divider></mat-divider>
              
          </p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button (click)="closeDialog()">Cancel</button>
          <button mat-button>Apply</button>
        </mat-card-actions>
      </mat-card>
    
      </div>
